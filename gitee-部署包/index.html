<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>现代社会产业全景图谱 | 三百六十行</title>
<style>
  :root{
    --bg:#0b1120; --panel:#121a2b; --panel2:#182238; --border:#26324a;
    --text:#e6ecf5; --text-dim:#93a1bd; --accent:#e0b954; --accent2:#4fc3f7;
    --danger:#ff6b6b; --radius:12px;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;background:
    radial-gradient(circle at 20% -10%, #1a2740 0%, var(--bg) 55%) fixed;color:var(--text);}
  header{padding:22px 28px 14px;border-bottom:1px solid var(--border);
    display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:14px;
    background:linear-gradient(180deg, rgba(224,185,84,0.06), transparent);}
  header h1{margin:0;font-size:22px;letter-spacing:1px;}
  header h1 span{color:var(--accent);}
  header .sub{color:var(--text-dim);font-size:12.5px;margin-top:4px;}
  .tabs{display:flex;gap:8px;flex-wrap:wrap;}
  .tab-btn{background:var(--panel2);border:1px solid var(--border);color:var(--text-dim);
    padding:9px 16px;border-radius:999px;cursor:pointer;font-size:13.5px;transition:.15s;white-space:nowrap;}
  .tab-btn:hover{color:var(--text);border-color:var(--accent2);}
  .tab-btn.active{background:var(--accent);color:#1a1305;border-color:var(--accent);font-weight:600;}
  .searchWrap{position:relative;}
  #searchBox{background:var(--panel2);border:1px solid var(--border);color:var(--text);
    padding:9px 14px;border-radius:999px;font-size:13.5px;width:220px;outline:none;}
  #searchBox:focus{border-color:var(--accent2);}
  #searchResults{position:absolute;top:42px;right:0;width:280px;background:var(--panel);
    border:1px solid var(--border);border-radius:10px;max-height:320px;overflow:auto;
    display:none;z-index:50;box-shadow:0 10px 30px rgba(0,0,0,.5);}
  #searchResults div{padding:9px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border);}
  #searchResults div:last-child{border-bottom:none;}
  #searchResults div:hover{background:var(--panel2);color:var(--accent2);}
  #searchResults .tag{color:var(--text-dim);font-size:11px;margin-left:6px;}

  main{padding:18px 28px 40px;max-width:1500px;margin:0 auto;}
  .view{display:none;}
  .view.active{display:block;}

  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:10px;}
  .hint{color:var(--text-dim);font-size:12.5px;}
  .resetBtn{background:var(--panel2);border:1px solid var(--border);color:var(--text-dim);
    padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12.5px;}
  .resetBtn:hover{color:var(--accent2);border-color:var(--accent2);}

  .chartCard{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
    padding:8px;box-shadow:0 8px 24px rgba(0,0,0,.25);}
  #sunburst{width:100%;height:640px;}
  #chinaMap{width:100%;height:640px;}
  #worldMap{width:100%;height:640px;}

  .legend{display:flex;flex-wrap:wrap;gap:8px 14px;margin:12px 2px 4px;}
  .legend .chip{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim);}
  .legend .dot{width:9px;height:9px;border-radius:50%;display:inline-block;}

  .mapLayout{display:flex;gap:16px;align-items:flex-start;}
  .mapLayout .chartCard{flex:1;min-width:0;}
  .sidePanel{width:300px;flex-shrink:0;background:var(--panel);border:1px solid var(--border);
    border-radius:var(--radius);padding:16px;min-height:640px;}
  .sidePanel h3{margin:0 0 4px;font-size:17px;color:var(--accent);}
  .sidePanel .placeholder{color:var(--text-dim);font-size:13px;line-height:1.7;margin-top:40px;text-align:center;}
  .sidePanel .indChips{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 14px;}
  .sidePanel .indChips span{background:var(--panel2);border:1px solid var(--border);color:var(--accent2);
    font-size:11.5px;padding:3px 9px;border-radius:999px;}
  .coCard{background:var(--panel2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;
    margin-bottom:9px;cursor:pointer;transition:.15s;}
  .coCard:hover{border-color:var(--accent);transform:translateX(2px);}
  .coCard b{font-size:13.5px;}
  .coCard p{margin:5px 0 0;font-size:12px;color:var(--text-dim);line-height:1.5;}

  @media (max-width:980px){
    .mapLayout{flex-direction:column;}
    .sidePanel{width:100%;min-height:auto;}
  }

  .modalMask{position:fixed;inset:0;background:rgba(4,8,18,.65);backdrop-filter:blur(2px);
    display:none;align-items:center;justify-content:center;z-index:100;}
  .modalMask.show{display:flex;}
  .modalBox{width:min(480px,90vw);background:var(--panel);border:1px solid var(--border);
    border-radius:16px;padding:26px 26px 22px;box-shadow:0 20px 60px rgba(0,0,0,.5);position:relative;
    animation:pop .18s ease;}
  @keyframes pop{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
  .modalBox .close{position:absolute;top:14px;right:16px;cursor:pointer;color:var(--text-dim);font-size:20px;}
  .modalBox .close:hover{color:var(--danger);}
  .modalBox .tagRow{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
  .modalBox .tagRow span{font-size:11.5px;padding:3px 10px;border-radius:999px;border:1px solid var(--border);color:var(--text-dim);}
  .modalBox h2{margin:0 0 12px;font-size:21px;}
  .modalBox .modelLabel{font-size:12px;color:var(--accent);margin-bottom:6px;letter-spacing:1px;}
  .modalBox p.desc{font-size:14.5px;line-height:1.9;color:var(--text);margin:0;}

  footer{text-align:center;color:var(--text-dim);font-size:11.5px;padding:20px;opacity:.7;}
</style>
</head>
<body>

<header>
  <div>
    <h1>现代社会<span>产业全景图谱</span></h1>
    <div class="sub">三百六十行 · 行行出状元 — 16大产业板块 · 上中下游产业链 · 点击企业查看商业模式</div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" data-view="v-tree">🌐 产业链全景旭日图</button>
    <button class="tab-btn" data-view="v-cn">🗺️ 中国产业地图</button>
    <button class="tab-btn" data-view="v-world">🌍 全球产业地图</button>
  </div>
  <div class="searchWrap">
    <input id="searchBox" placeholder="搜索企业 / 行业…" autocomplete="off">
    <div id="searchResults"></div>
  </div>
</header>

<main>

  <div id="v-tree" class="view active">
    <div class="toolbar">
      <div class="hint">点击色块可逐层放大查看「板块 → 上中下游 → 代表企业」，点击中心圆可返回上一层；点击企业名查看商业模式简述</div>
      <button class="resetBtn" id="resetTree">重置视图</button>
    </div>
    <div class="chartCard"><div id="sunburst"></div></div>
    <div class="legend" id="legend"></div>
  </div>

  <div id="v-cn" class="view">
    <div class="toolbar">
      <div class="hint">鼠标滚轮缩放、拖拽平移；点击省份查看当地代表产业集群与龙头企业</div>
      <button class="resetBtn" id="resetCN">重置视图</button>
    </div>
    <div class="mapLayout">
      <div class="chartCard"><div id="chinaMap"></div></div>
      <div class="sidePanel" id="cnPanel"><div class="placeholder">👈 点击地图上的省份<br>查看当地产业集群与代表企业</div></div>
    </div>
  </div>

  <div id="v-world" class="view">
    <div class="toolbar">
      <div class="hint">鼠标滚轮缩放、拖拽平移；点击国家/地区查看当地代表产业与龙头企业</div>
      <button class="resetBtn" id="resetWorld">重置视图</button>
    </div>
    <div class="mapLayout">
      <div class="chartCard"><div id="worldMap"></div></div>
      <div class="sidePanel" id="worldPanel"><div class="placeholder">👈 点击地图上的国家/地区<br>查看当地产业集群与代表企业</div></div>
    </div>
  </div>

</main>

<footer>数据为示意性整理，聚焦代表性行业与企业，用于宏观认知产业结构，不构成投资建议。</footer>

<div class="modalMask" id="modalMask">
  <div class="modalBox">
    <span class="close" id="modalClose">✕</span>
    <div class="tagRow" id="modalTags"></div>
    <h2 id="modalTitle"></h2>
    <div class="modelLabel">商业模式简述</div>
    <p class="desc" id="modalDesc"></p>
  </div>
</div>

<script>
/* ========================= 数据层 ========================= */
function sec(name,color,chains){return {name:name,color:color,chains:chains};}
function stage(name,companies){return {stage:name,companies:companies};}
function co(name,model){return {name:name,model:model};}

const SECTORS = [
  sec('农林牧渔业','#4CAF50',[
    stage('上游·种养殖',[
      co('隆平高科','全球领先的杂交水稻种子研发企业，通过专利品种研发与种子销售获利，构建"育繁推一体化"商业模式。'),
      co('牧原股份','生猪养殖全产业链自繁自养，依托规模化、低成本自繁自养模式赚取生猪出栏价差。'),
      co('温氏股份','"公司+农户"轻资产代养模式，公司提供种苗饲料技术，农户代养分成，降低固定资产投入。')
    ]),
    stage('中游·加工贸易',[
      co('中粮集团','全球农产品贸易与粮油加工一体化央企，通过"种植-仓储物流-加工-贸易"全链条赚取加工增值与贸易价差。'),
      co('双汇发展','生猪屠宰及肉制品深加工企业，通过屠宰产能利用率与高毛利低温肉制品品牌溢价盈利。')
    ]),
    stage('下游·品牌消费',[
      co('伊利股份','全国性乳制品品牌商，依托奶源基地、渠道网络与品牌营销实现终端产品溢价销售。'),
      co('海天味业','调味品行业龙头，依托强大经销商网络与品牌复购率构建"渠道为王"快消模式。')
    ])
  ]),
  sec('能源与矿产','#795548',[
    stage('上游·资源勘探开采',[
      co('中国石油','油气一体化央企，勘探开采、管道运输、炼化销售全产业链，承担国家能源保供职能。'),
      co('中国神华','煤炭一体化企业，自有煤矿开采+铁路港口运输+自建电厂，通过"煤电路港航"一体化平抑周期波动。'),
      co('紫金矿业','全球化金属矿业公司，通过低成本收购海外矿山资源、技术提升回收率获取矿产资源溢价。')
    ]),
    stage('中游·炼化加工',[
      co('中国石化','全球最大炼油公司之一，原油采购—炼制—成品油及化工品销售一体化运营。'),
      co('陕西煤业','陕北优质动力煤开采洗选企业，以长协价+市场价结合方式销售给电厂钢厂客户。')
    ]),
    stage('下游·终端能源与新能源',[
      co('国家电网','电力输配电网络运营商，通过购销价差及输配电费获取稳定收益，承担电网普遍服务。'),
      co('隆基绿能','全球光伏组件龙头，通过硅片—电池片—组件垂直一体化制造降本，面向电站开发商销售。')
    ])
  ]),
  sec('化工与新材料','#9C27B0',[
    stage('上游·基础化工原料',[
      co('万华化学','全球MDI（聚氨酯原料）龙头，依托自主技术壁垒与规模化装置获取高附加值化工品利润。'),
      co('巴斯夫 BASF','全球最大化工公司之一，"一体化生产基地"（Verbund）模式降低能耗与物料损耗成本。')
    ]),
    stage('中游·精细化工',[
      co('荣盛石化','民营大炼化一体化企业，原油进口—炼化—化纤全产业链一体化，压缩中间环节成本。')
    ]),
    stage('下游·新材料应用',[
      co('恩捷股份','全球锂电池隔膜龙头，通过高壁垒湿法隔膜工艺绑定动力电池大厂长单供应。'),
      co('璞泰来','锂电池负极材料及设备供应商，深度受益新能源汽车产业链高景气度。')
    ])
  ]),
  sec('汽车产业','#F44336',[
    stage('上游·核心零部件',[
      co('宁德时代','全球动力电池龙头，通过规模化生产、材料体系创新与长期供货协议绑定车企客户。'),
      co('福耀玻璃','全球汽车玻璃龙头，通过全球化产能布局与主机厂同步开发获取稳定长期订单。')
    ]),
    stage('中游·整车制造',[
      co('比亚迪','电池—电机—电控—整车垂直一体化新能源车企，通过成本控制与规模化实现盈利。'),
      co('特斯拉 Tesla','智能电动车企，通过直营销售+软件订阅（FSD）+储能业务构建多元盈利模式。'),
      co('丰田汽车 Toyota','全球最大车企之一，精益生产（TPS）体系+混动技术专利构筑成本与技术双壁垒。')
    ]),
    stage('下游·后市场与出行',[
      co('途虎养车','汽车后市场服务平台，线上引流+线下门店维保，赚取服务与配件差价。'),
      co('滴滴出行','网约车出行平台，通过抽取司机端订单佣金及广告增值服务盈利。')
    ])

  sec('电子信息与半导体','#2196F3',[
    stage('上游·芯片设计制造',[

    ]),
    stage('下游·终端品牌',[
      co('苹果公司 Apple','消费电子品牌商，自研芯片+软硬件生态闭环+高端品牌溢价+服务订阅收入。'),
      co('华为','通信设备与智能终端厂商，ToB电信设备+ToC终端+云服务多元业务，技术研发驱动高端化。'),
      co('小米集团','"硬件+互联网服务+新零售"铁人三项模式，硬件低毛利走量，互联网服务变现流量。')
    ])
  ]),
  sec('建筑与房地产','#FF9800',[
    stage('上游·建材',[
      co('海螺水泥','全国水泥龙头，"T型"沿江沿海战略布局降低运输成本，规模化生产获取成本优势。')
    ]),
    stage('中游·开发建设',[
      co('万科','住宅开发运营商，通过"拿地—开发—销售"周转模式及物业增值服务多元化转型。'),
      co('中国建筑','全球最大建筑工程承包商，工程总承包（EPC）模式赚取施工利润及部分自主投资开发收益。')
    ]),
    stage('下游·物业与经纪服务',[
      co('万物云','物业管理服务商，按面积/合同收取物业费并拓展社区团购、维修等增值服务。'),
      co('贝壳找房','房产经纪交易平台，整合行业经纪人资源，通过居间服务费（佣金）盈利。')
    ])
  ]),
  sec('消费品与零售','#E91E63',[
    stage('上游·品牌制造',[
      co('农夫山泉','天然水及饮料品牌商，自有水源地+高效渠道分销网络实现品牌溢价。'),
      co('蒙牛乳业','全国性乳品品牌，依托奶源整合与全国经销网络实现规模化销售。')
    ]),
    stage('中游·零售渠道',[
      co('沃尔玛 Walmart','全球最大商超零售商，"天天低价"+强大供应链议价能力，薄利多销。'),

    ]),

  ]),
  sec('信息技术与互联网','#00BCD4',[
    stage('上游·基础设施（云与算力）',[

    ]),
    stage('中游·软件与SaaS',[
      co('微软 Microsoft','操作系统+生产力软件+Azure云+游戏多元业务，订阅制（Microsoft 365）持续收费。'),
      co('用友网络','企业管理软件及云服务商，从License卖断模式转向云订阅SaaS模式。')

/* ========================= 工具函数 ========================= */
function normalizeCN(name){
  return name.replace(/(特别行政区|壮族自治区|回族自治区|维吾尔自治区|自治区|省|市)$/,'');
}
function findRegionByName(list, name){
  const n = normalizeCN(name);
  return list.find(r => r.aliases.some(a => normalizeCN(a) === n || a === name) || normalizeCN(r.name) === n);
}
function findCompany(query){
  const q = query.trim().toLowerCase();
  if(!q) return [];
  const out = [];
  SECTORS.forEach(s=>{
    s.chains.forEach(c=>{
      c.companies.forEach(co=>{
        const matched = co.name.toLowerCase().includes(q) || s.name.toLowerCase().includes(q);
        if(matched && out.length<8){
          out.push({name:co.name, model:co.model, sector:s.name, stage:c.stage});
        }
      });
    });
  });
  return out.slice(0,8);
}

/* ========================= 弹窗 ========================= */
function showDetail(title, tags, desc){
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalDesc').textContent = desc || '暂无详细简述。';
  const tagRow = document.getElementById('modalTags');
  tagRow.innerHTML = '';
  (tags||[]).forEach(t=>{
    const s = document.createElement('span');
    s.textContent = t;
    tagRow.appendChild(s);
  });
  document.getElementById('modalMask').classList.add('show');
}
document.getElementById('modalClose').onclick = ()=> document.getElementById('modalMask').classList.remove('show');
document.getElementById('modalMask').addEventListener('click', e=>{
  if(e.target.id==='modalMask') e.target.classList.remove('show');
});

/* ========================= Tab 切换 ========================= */
const tabBtns = document.querySelectorAll('.tab-btn');
tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.getElementById(btn.dataset.view).classList.add('active');
    setTimeout(()=>{
      if(btn.dataset.view==='v-tree' && sunburstChart) sunburstChart.resize();
      if(btn.dataset.view==='v-cn' && chinaChart) chinaChart.resize();
      if(btn.dataset.view==='v-world' && worldChart) worldChart.resize();
    }, 60);
  });
});

/* ========================= 脚本加载（多CDN容错） ========================= */
function loadScript(urls){
  return new Promise((resolve,reject)=>{
    let i=0;
    function tryNext(){
      if(i>=urls.length){reject(new Error('all cdn failed'));return;}
      const s=document.createElement('script');
      s.src=urls[i++];
      s.onload=resolve;
      s.onerror=tryNext;
      document.head.appendChild(s);
    }
    tryNext();
  });
}
function fetchJsonFallback(urls){
  return urls.reduce((p,url)=> p.catch(()=> fetch(url).then(r=>{
    if(!r.ok) throw new Error('bad status');
    return r.json();
  })), Promise.reject());
}

/* ========================= 旭日图 ========================= */
function buildSunburstData(){
  return SECTORS.map(s=>({
    name:s.name,
    itemStyle:{color:s.color},
    children:s.chains.map(c=>({
      name:c.stage,
      children:c.companies.map(company=>({
        name:company.name,
        value:1,
        model:company.model,
        sectorName:s.name,
        stageName:c.stage
      }))
    }))
  }));
}

function initSunburst(){
  sunburstChart = echarts.init(document.getElementById('sunburst'), null, {renderer:'canvas'});
  const option = {
    backgroundColor:'transparent',
    tooltip:{
      formatter:function(info){
        return info.name;
      }
    },
    series:[{
      type:'sunburst',
      data: buildSunburstData(),
      radius:[50,'92%'],
      sort:undefined,
      emphasis:{focus:'ancestor'},
      itemStyle:{borderColor:'#0b1120',borderWidth:1.5},
      label:{color:'#0b1120',fontSize:11},
      levels:[
        {},
        {
          r0:50, r:'32%',
          itemStyle:{borderWidth:2},
          label:{rotate:0,fontSize:12.5,fontWeight:'bold',color:'#0b1120'}
        },
        {
          r0:'32%', r:'62%',
          label:{align:'center',fontSize:10.5,color:'#0b1120'},
          itemStyle:{opacity:0.9}
        },
        {
          r0:'62%', r:'92%',
          label:{position:'outside',silent:false,fontSize:10.5,color:'#e6ecf5'},
          itemStyle:{opacity:0.85,borderWidth:1}
        }
      ]
    }]
  };
  sunburstChart.setOption(option);
  sunburstChart.on('click', function(params){
    const d = params.data;
    if(d && d.model){
      showDetail(d.name, [d.sectorName, d.stageName], d.model);
    }
  });
  window.addEventListener('resize', ()=> sunburstChart.resize());

  document.getElementById('resetTree').onclick = function(){
    sunburstChart.setOption(option, true);
  };
}

function initLegend(){
  const box = document.getElementById('legend');
  SECTORS.forEach(s=>{
    const chip = document.createElement('div');
    chip.className='chip';
    chip.innerHTML = '<span class="dot" style="background:'+s.color+'"></span>' + s.name;
    box.appendChild(chip);
  });
}

/* ========================= 中国地图 ========================= */
function initChinaMap(){
  chinaChart = echarts.init(document.getElementById('chinaMap'), null, {renderer:'canvas'});
  chinaChart.showLoading();
  fetchJsonFallback([
    './china.json',
    'https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json',
    'https://cdn.jsdelivr.net/gh/apache/echarts-examples@master/public/data/asset/geo/china.json'
  ]).then(geoJson=>{
    chinaChart.hideLoading();
    echarts.registerMap('CHINA_MAP', geoJson);
    const seriesData = geoJson.features.map(f=>{
      const r = findRegionByName(CHINA_REGIONS, f.properties.name);
      return {name:f.properties.name, value: r ? r.companies.length : 0};
    });
    const option = {
      backgroundColor:'transparent',
      tooltip:{
        trigger:'item',
        formatter: function(p){
          const r = findRegionByName(CHINA_REGIONS, p.name);
          if(!r) return p.name;
          return p.name + '<br/>主导产业：' + r.industries.slice(0,3).join('、');
        }
      },
      visualMap:{
        min:0, max:4, show:false,
        inRange:{color:['#182238','#1f4d6b','#2f7fa8','#4fc3f7']}
      },
      series:[{
        type:'map',
        map:'CHINA_MAP',
        roam:true,
        scaleLimit:{min:1,max:8},
        label:{show:false},
        emphasis:{
          label:{show:true,color:'#0b1120',fontSize:11},
          itemStyle:{areaColor:'#e0b954'}
        },
        itemStyle:{borderColor:'#0b1120',borderWidth:0.6},
        data: seriesData
      }]
    };
    chinaChart.setOption(option);
    chinaChart.on('click', function(params){
      const r = findRegionByName(CHINA_REGIONS, params.name);
      renderRegionPanel('cnPanel', r, params.name);
    });
    document.getElementById('resetCN').onclick = function(){
      chinaChart.dispatchAction({type:'restore'});
    };
  }).catch(()=>{
    chinaChart.hideLoading();
    document.getElementById('chinaMap').innerHTML =
      '<p style="color:#ff6b6b;padding:40px;text-align:center;">中国地图数据加载失败，请检查网络后刷新。</p>';
  });
  window.addEventListener('resize', ()=> chinaChart && chinaChart.resize());
}

function renderRegionPanel(panelId, region, fallbackName){
  const panel = document.getElementById(panelId);
  if(!region){
    panel.innerHTML = '<h3>'+fallbackName+'</h3><div class="placeholder">暂无该地区的产业数据收录。</div>';
    return;
  }
  let html = '<h3>'+region.name+'</h3><div class="indChips">';
  region.industries.forEach(i=> html += '<span>'+i+'</span>');
  html += '</div>';
  region.companies.forEach((c,idx)=>{
    html += '<div class="coCard" data-idx="'+idx+'"><b>'+c.name+'</b><p>'+c.note+'</p></div>';
  });
  panel.innerHTML = html;
  panel.querySelectorAll('.coCard').forEach((el,idx)=>{
    el.onclick = ()=>{
      const c = region.companies[idx];
      showDetail(c.name, [region.name], c.note);
    };
  });
}

/* ========================= 搜索 ========================= */
function initSearch(){
  const box = document.getElementById('searchBox');
  const results = document.getElementById('searchResults');
  box.addEventListener('input', function(){
    const matches = findCompany(box.value);
    if(!matches.length){ results.style.display='none'; return; }
    results.innerHTML = matches.map((m,i)=>
      '<div data-idx="'+i+'">'+m.name+'<span class="tag">'+m.sector+' · '+m.stage+'</span></div>'
    ).join('');
    results.style.display='block';
    results.querySelectorAll('div').forEach((el,i)=>{
      el.onclick = ()=>{
        const m = matches[i];
        showDetail(m.name, [m.sector, m.stage], m.model);
        results.style.display='none';
        box.value='';
      };
    });
  });
  document.addEventListener('click', function(e){
    if(!e.target.closest('.searchWrap')) results.style.display='none';
  });
}
